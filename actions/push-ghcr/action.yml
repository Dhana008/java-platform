name: Push GHCR

description: Push container image to GitHub Container Registry

runs:
  using: composite

  steps:

    - name: Login to GHCR
      shell: bash
      run: |
        echo "${{ github.token }}" | docker login ghcr.io \
          -u ${{ github.actor }} \
          --password-stdin

    - name: Tag Image
      shell: bash
      run: |
        docker tag app:${GITHUB_SHA} \
        ghcr.io/${{ github.repository }}/app:${GITHUB_SHA}

    - name: Push Image
      shell: bash
      run: |
        docker push \
        ghcr.io/${{ github.repository }}/app:${GITHUB_SHA}
