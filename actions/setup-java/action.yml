name: Setup Java

description: Setup Java 17 and Maven cache

runs:
  using: composite

  steps:

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    - name: Verify Java
      shell: bash
      run: java -version

    - name: Verify Maven
      shell: bash
      run: mvn -version
