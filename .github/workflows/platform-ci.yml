name: Platform CI

on:
  workflow_call:
    inputs:
      java-version:
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:

  ci:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: Dhana008/java-platform/actions/setup-java@develop
        with:
          java-version: ${{ inputs.java-version }}

      - name: Build
        uses: Dhana008/java-platform/actions/compile@develop

      - name: Unit Test
        uses: Dhana008/java-platform/actions/unit-test@develop

      - name: Package
        uses: Dhana008/java-platform/actions/package-jar@develop

      - name: Generate SBOM
        uses: Dhana008/java-platform/actions/generate-sbom@develop

      - name: Build Container
        uses: Dhana008/java-platform/actions/build-container@develop

      - name: Image Metadata
        id: image
        uses: Dhana008/java-platform/actions/image-metadata@develop

      - name: Trivy Scan
        uses: Dhana008/java-platform/actions/trivy-scan@develop

      - name: Push Image
        uses: Dhana008/java-platform/actions/push-image@develop
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}
